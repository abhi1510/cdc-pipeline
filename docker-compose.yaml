services:

  postgres:
    image: debezium/postgres:15
    container_name: cdc-pipeline-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cdc-pipeline-kafka
    hostname: kafka  
    ports:
      - "9092:9092"    
    environment:
      CLUSTER_ID: Nx8mOfTZRzCf4GVKAr75jA

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:2.5
    container_name: cdc-pipeline-connect
    depends_on:
      kafka:
          condition: service_healthy
      postgres:
          condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status

      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10


  connect-init:
    image: curlimages/curl:8.5.0
    container_name: cdc-pipeline-connect-init
    depends_on:
      connect:
        condition: service_healthy
    volumes:
      - ./connectors:/connectors
    environment:
      CONNECT_URL: http://connect:8083
      CONNECTOR_CONFIG: /connectors/postgres-connector.json
      CONNECTOR_NAME: postgres-connector
    command: ["sh", "/connectors/init.sh"]

  maildev:
    image: maildev/maildev
    container_name: cdc-pipeline-maildev
    ports:
      - "1080:1080"   # UI
      - "1025:1025"   # SMTP

  notification:
    build: ./notifications
    container_name: cdc-pipeline-notification
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOPIC: cdc.public.users
      GROUP_ID: notifications-group
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      FROM_EMAIL: notification@cdc-pipeline
    depends_on:
      kafka:
        condition: service_healthy
      maildev:
        condition: service_started

  